<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
        <meta http-equiv="Content-Security-Policy" content="default-src 'self' data: gap: https://ssl.gstatic.com 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; media-src *; img-src 'self' data: content:;">
        <meta name="format-detection" content="telephone=no">
        <meta name="msapplication-tap-highlight" content="no">
        <title>Discount Card App</title>
        
        <!-- Bootstrap CSS for modern UI -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
        <link rel="stylesheet" href="css/styles.css">
    </head>
    <body>
        <div id="app" class="container-fluid">
            <!-- Navigation Header -->
            <nav class="navbar navbar-dark bg-primary mb-4">
                <div class="container-fluid">
                    <span class="navbar-brand mb-0 h1">
                        <i class="bi bi-credit-card"></i>
                        Discount Cards
                    </span>
                    <button class="btn btn-outline-light" id="addCardBtn">
                        <i class="bi bi-plus-circle"></i>
                        Add Card
                    </button>
                </div>
            </nav>

            <!-- Main Content -->
            <div id="mainView">
                <!-- Cards List -->
                <div id="cardsList" class="row g-3">
                    <!-- Cards will be dynamically inserted here -->
                </div>

                <!-- Empty State -->
                <div id="emptyState" class="text-center py-5" style="display: none;">
                    <i class="bi bi-credit-card-2-front display-1 text-muted"></i>
                    <h3 class="mt-3 text-muted">No Discount Cards</h3>
                    <p class="text-muted">Add your first discount card by tapping the + button above</p>
                    <button class="btn btn-primary btn-lg" id="addFirstCardBtn">
                        <i class="bi bi-plus-circle"></i>
                        Add Your First Card
                    </button>
                </div>
            </div>

            <!-- Add/Edit Card Form -->
            <div id="cardFormView" style="display: none;">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">
                            <i class="bi bi-credit-card"></i>
                            <span id="formTitle">Add New Card</span>
                        </h5>
                    </div>
                    <div class="card-body">
                        <form id="cardForm">
                            <div class="mb-3">
                                <label for="cardName" class="form-label">Card Name</label>
                                <input type="text" class="form-control" id="cardName" required placeholder="e.g., Starbucks, Target">
                            </div>
                            
                            <div class="mb-3">
                                <label for="cardNumber" class="form-label">Card Number</label>
                                <input type="text" class="form-control" id="cardNumber" placeholder="Enter card number">
                            </div>
                            
                            <div class="mb-3">
                                <label for="cardColor" class="form-label">Card Color</label>
                                <select class="form-select" id="cardColor">
                                    <option value="primary">Blue</option>
                                    <option value="success">Green</option>
                                    <option value="danger">Red</option>
                                    <option value="warning">Yellow</option>
                                    <option value="info">Cyan</option>
                                    <option value="dark">Dark</option>
                                </select>
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">QR Code</label>
                                <div class="d-grid gap-2">
                                    <button type="button" class="btn btn-outline-primary" id="scanQRBtn">
                                        <i class="bi bi-qr-code-scan"></i>
                                        Scan QR Code
                                    </button>
                                    <button type="button" class="btn btn-outline-secondary" id="manualQRBtn">
                                        <i class="bi bi-keyboard"></i>
                                        Enter Manually
                                    </button>
                                </div>
                                <textarea class="form-control mt-2" id="qrData" rows="3" placeholder="QR code data will appear here" style="display: none;"></textarea>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-check-circle"></i>
                                    Save Card
                                </button>
                                <button type="button" class="btn btn-secondary" id="cancelBtn">
                                    <i class="bi bi-x-circle"></i>
                                    Cancel
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <!-- QR Scanner View -->
            <div id="scannerView" style="display: none;">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">
                            <i class="bi bi-qr-code-scan"></i>
                            Scan QR Code
                        </h5>
                    </div>
                    <div class="card-body text-center">
                        <div id="qrPreview" class="mb-3" style="height: 300px; background: #f8f9fa; border: 2px dashed #dee2e6; display: flex; align-items: center; justify-content: center;">
                            <div>
                                <i class="bi bi-camera display-1 text-muted"></i>
                                <p class="text-muted mt-2">Position QR code within the frame</p>
                            </div>
                        </div>
                        <div class="d-grid gap-2">
                            <button class="btn btn-success" id="startScanBtn">
                                <i class="bi bi-play-circle"></i>
                                Start Scanning
                            </button>
                            <button class="btn btn-danger" id="stopScanBtn" style="display: none;">
                                <i class="bi bi-stop-circle"></i>
                                Stop Scanning
                            </button>
                            <button class="btn btn-secondary" id="cancelScanBtn">
                                <i class="bi bi-x-circle"></i>
                                Cancel
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Card Detail View -->
            <div id="cardDetailView" style="display: none;">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h5 class="card-title mb-0" id="cardDetailName">
                            <i class="bi bi-credit-card"></i>
                            Card Name
                        </h5>
                        <div>
                            <button class="btn btn-outline-primary btn-sm" id="editCardBtn">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-outline-danger btn-sm" id="deleteCardBtn">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                    </div>
                    <div class="card-body text-center">
                        <!-- QR Code Display -->
                        <div id="qrCodeDisplay" class="mb-3">
                            <canvas id="qrCanvas" style="max-width: 100%; height: auto;"></canvas>
                        </div>
                        
                        <!-- Card Information -->
                        <div class="card-info">
                            <p class="card-text"><strong>Card Number:</strong> <span id="cardDetailNumber">-</span></p>
                            <p class="card-text"><strong>Added:</strong> <span id="cardDetailDate">-</span></p>
                        </div>
                        
                        <button class="btn btn-secondary" id="backToListBtn">
                            <i class="bi bi-arrow-left"></i>
                            Back to Cards
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Toast for notifications -->
        <div class="toast-container position-fixed bottom-0 end-0 p-3">
            <div id="toast" class="toast" role="alert">
                <div class="toast-header">
                    <i class="bi bi-info-circle me-2"></i>
                    <strong class="me-auto">Notification</strong>
                    <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
                </div>
                <div class="toast-body" id="toastMessage">
                    Message
                </div>
            </div>
        </div>

        <!-- Scripts -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
        <script src="cordova.js"></script>
        <script src="js/app.js"></script>
    </body>
</html>
